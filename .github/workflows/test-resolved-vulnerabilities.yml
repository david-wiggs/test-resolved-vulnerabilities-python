name: 'Test Resolved Vulnerabilities - Python'

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Dependency Review with Resolved Vulnerabilities'
        id: review
        uses: david-wiggs/dependency-review-action@test-with-dist
        with:
          fail-on-severity: critical
          show-resolved-vulnerabilities: true
          comment-summary-in-pr: always

      - name: 'Show Resolved Vulnerabilities Output'
        if: always()
        env:
          RESOLVED: ${{ steps.review.outputs.resolved-vulnerabilities }}
        run: |
          echo "=== Resolved Vulnerabilities Output ==="
          echo "$RESOLVED" | jq .
          COUNT=$(echo "$RESOLVED" | jq 'length')
          echo "Total resolved: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "🎉 This PR resolves $COUNT vulnerabilities!"
            echo "$RESOLVED" | jq -r '.[] | "  - \(.severity | ascii_upcase): \(.advisory_summary) in \(.package_name)@\(.package_version)"'
          else
            echo "No resolved vulnerabilities detected."
          fi
